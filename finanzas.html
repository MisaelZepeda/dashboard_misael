<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súper App Financiera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --bg: #0f172a; --surface: #1e293b; --primary: #3b82f6; 
            --success: #10b981; --danger: #ef4444; --text: #f8fafc; --muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        /* Dashboard Header */
        .main-header { padding: 30px 20px; background: linear-gradient(180deg, #1e40af, #0f172a); border-bottom: 1px solid #334155; }
        .balance-label { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
        .balance-main { font-size: 42px; font-weight: 800; margin: 5px 0; }

        .container { padding: 15px; max-width: 700px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        
        /* Tabs */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* Accounts & Transactions */
        .bank-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #334155; }
        .bank-info { display: flex; align-items: center; gap: 15px; }
        .bank-icon { width: 40px; height: 40px; border-radius: 10px; background: white; object-fit: contain; padding: 5px; }
        
        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #334155; }
        .nav-item { border: none; background: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="main-header">
        <p class="balance-label">Patrimonio Neto Total</p>
        <h1 class="balance-main" id="valPatrimonio">$0.00</h1>
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <div><small style="color:var(--success)">Tengo:</small> <p id="valTengo">$0.00</p></div>
            <div><small style="color:var(--danger)">Debo:</small> <p id="valDebo">$0.00</p></div>
        </div>
    </header>

    <main class="container">
        
        <section id="tab-resumen" class="tab-content active">
            <div class="card">
                <h3>Gastos por Categoría</h3>
                <canvas id="chartGastos" style="max-height: 250px;"></canvas>
            </div>
            <div class="card">
                <h3>Cuentas con más Saldo</h3>
                <div id="topCuentas"></div>
            </div>
        </section>

        <section id="tab-ingresos" class="tab-content">
            <div class="card">
                <h3>Registrar Ingreso</h3>
                <form onsubmit="handleIngreso(event)">
                    <div class="form-group">
                        <label>Cantidad ($)</label>
                        <input type="number" id="inMonto" required step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Cuenta de Destino</label>
                        <select id="inCuenta" class="lista-cuentas-debito"></select>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="inFecha" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Registrar Ingreso</button>
                </form>
            </div>
        </section>

        <section id="tab-traspasos" class="tab-content">
            <div class="card">
                <h3>Mover Dinero</h3>
                <form onsubmit="handleTraspaso(event)">
                    <div class="form-group">
                        <label>De cuenta:</label>
                        <select id="trOrigen" class="lista-cuentas-todas"></select>
                    </div>
                    <div class="form-group">
                        <label>A cuenta:</label>
                        <select id="trDestino" class="lista-cuentas-todas"></select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad</label>
                        <input type="number" id="trMonto" required step="0.01">
                    </div>
                    <button type="submit" class="btn btn-primary">Ejecutar Traspaso</button>
                </form>
            </div>
        </section>

        <section id="tab-gastos" class="tab-content">
            <div class="card">
                <h3>Nuevo Gasto</h3>
                <form onsubmit="handleGasto(event)">
                    <div class="form-group"><input type="text" id="gaNombre" placeholder="¿En qué gastaste?" required></div>
                    <div class="form-group">
                        <select id="gaCat">
                            <option>Comida</option><option>Servicios</option><option>Ocio</option><option>Salud</option><option>Otros</option>
                        </select>
                    </div>
                    <div class="form-group"><input type="number" id="gaMonto" placeholder="Monto" required step="0.01"></div>
                    <div class="form-group">
                        <label>Pagar con:</label>
                        <select id="gaFuente" class="lista-cuentas-todas"></select>
                    </div>
                    <button type="submit" class="btn btn-primary">Registrar Gasto</button>
                </form>
            </div>
        </section>

        <section id="tab-cuentas" class="tab-content">
            <div class="card">
                <h3>Nueva Cuenta o Tarjeta</h3>
                <form onsubmit="handleNuevaCuenta(event)">
                    <input type="text" id="cuNombre" placeholder="Nombre (Ej. Santander)" required style="margin-bottom:10px">
                    <input type="text" id="cuWeb" placeholder="Dominio del banco (ej: santander.com.mx)" style="margin-bottom:10px">
                    <select id="cuTipo" style="margin-bottom:10px">
                        <option value="debito">Débito / Efectivo</option>
                        <option value="credito">Tarjeta de Crédito</option>
                    </select>
                    <input type="number" id="cuSaldo" placeholder="Saldo Inicial / Deuda actual" required style="margin-bottom:10px">
                    <button type="submit" class="btn btn-primary">Dar de Alta</button>
                </form>
            </div>
            <div class="card" id="listaMaestraCuentas"></div>
        </section>

    </main>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="cambiarTab('resumen', this)"><span>📊</span>Resumen</button>
        <button class="nav-item" onclick="cambiarTab('ingresos', this)"><span>💰</span>Ingreso</button>
        <button class="nav-item" onclick="cambiarTab('traspasos', this)"><span>🔄</span>Traspaso</button>
        <button class="nav-item" onclick="cambiarTab('gastos', this)"><span>💸</span>Gasto</button>
        <button class="nav-item" onclick="cambiarTab('cuentas', this)"><span>🏦</span>Cuentas</button>
    </nav>

    <script>
        // --- CONFIG FIREBASE ---
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { cuentas: [], transacciones: [] };
        let chartInstance = null;

        // --- FETCH INICIAL ---
        db.ref('Finanzas').on('value', snap => {
            const data = snap.val() || { cuentas: {}, transacciones: {} };
            state.cuentas = data.cuentas ? Object.values(data.cuentas) : [];
            state.transacciones = data.transacciones ? Object.values(data.transacciones) : [];
            renderAll();
        });

        // --- HANDLERS ---
        function handleNuevaCuenta(e) {
            e.preventDefault();
            const id = Date.now();
            const cu = {
                id,
                nombre: document.getElementById('cuNombre').value,
                tipo: document.getElementById('cuTipo').value,
                saldo: parseFloat(document.getElementById('cuSaldo').value),
                icon: `https://www.google.com/s2/favicons?domain=${document.getElementById('cuWeb').value}&sz=64`
            };
            db.ref('Finanzas/cuentas/' + id).set(cu);
            e.target.reset();
        }

        function handleIngreso(e) {
            e.preventDefault();
            const monto = parseFloat(document.getElementById('inMonto').value);
            const cuentaId = document.getElementById('inCuenta').value;
            const cuenta = state.cuentas.find(c => c.id == cuentaId);
            
            // Actualizar Saldo
            db.ref(`Finanzas/cuentas/${cuentaId}/saldo`).set(cuenta.saldo + monto);
            
            // Registrar Transacción
            db.ref('Finanzas/transacciones').push({ tipo: 'ingreso', monto, fecha: document.getElementById('inFecha').value, cuenta: cuenta.nombre });
            e.target.reset();
        }

        function handleGasto(e) {
            e.preventDefault();
            const monto = parseFloat(document.getElementById('gaMonto').value);
            const cuentaId = document.getElementById('gaFuente').value;
            const cuenta = state.cuentas.find(c => c.id == cuentaId);

            // Si es débito resta, si es crédito suma a la deuda
            const nuevoSaldo = cuenta.tipo === 'debito' ? cuenta.saldo - monto : cuenta.saldo + monto;
            
            db.ref(`Finanzas/cuentas/${cuentaId}/saldo`).set(nuevoSaldo);
            db.ref('Finanzas/transacciones').push({ tipo: 'gasto', monto, cat: document.getElementById('gaCat').value, nombre: document.getElementById('gaNombre').value });
            e.target.reset();
        }

        function handleTraspaso(e) {
            e.preventDefault();
            const monto = parseFloat(document.getElementById('trMonto').value);
            const idOr = document.getElementById('trOrigen').value;
            const idDes = document.getElementById('trDestino').value;

            const cOr = state.cuentas.find(c => c.id == idOr);
            const cDes = state.cuentas.find(c => c.id == idDes);

            // Lógica: Resta de origen, Suma a destino
            // Nota: Si el destino es una tarjeta de crédito, sumar (o restar deuda) depende de tu lógica. Aquí asumimos abono.
            db.ref(`Finanzas/cuentas/${idOr}/saldo`).set(cOr.saldo - monto);
            db.ref(`Finanzas/cuentas/${idDes}/saldo`).set(cDes.tipo === 'credito' ? cDes.saldo - monto : cDes.saldo + monto);
            
            alert("Traspaso exitoso");
            e.target.reset();
        }

        // --- RENDERIZADO ---
        function renderAll() {
            let totalTengo = 0;
            let totalDebo = 0;

            // Actualizar Selects
            const selects = document.querySelectorAll('.lista-cuentas-todas');
            const selectDebito = document.querySelectorAll('.lista-cuentas-debito');
            
            let options = state.cuentas.map(c => `<option value="${c.id}">${c.nombre} ($${c.saldo.toLocaleString()})</option>`).join('');
            selects.forEach(s => s.innerHTML = options);
            selectDebito.forEach(s => s.innerHTML = state.cuentas.filter(c => c.tipo === 'debito').map(c => `<option value="${c.id}">${c.nombre}</option>`).join(''));

            // Lista Maestra y Patrimonio
            const listaHTML = state.cuentas.map(c => {
                if(c.tipo === 'debito') totalTengo += c.saldo; else totalDebo += c.saldo;
                return `
                    <div class="bank-item">
                        <div class="bank-info">
                            <img src="${c.icon}" class="bank-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2830/2830284.png'">
                            <div><b>${c.nombre}</b><br><small>${c.tipo}</small></div>
                        </div>
                        <div style="text-align:right">
                            <b style="color: ${c.tipo === 'debito' ? 'var(--success)' : 'var(--danger)'}">
                                $${c.saldo.toLocaleString()}
                            </b>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('listaMaestraCuentas').innerHTML = '<h3>Mis Cuentas</h3>' + listaHTML;
            document.getElementById('valTengo').innerText = `$${totalTengo.toLocaleString()}`;
            document.getElementById('valDebo').innerText = `$${totalDebo.toLocaleString()}`;
            document.getElementById('valPatrimonio').innerText = `$${(totalTengo - totalDebo).toLocaleString()}`;
            
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('chartGastos').getContext('2d');
            const cats = {};
            state.transacciones.filter(t => t.tipo === 'gasto').forEach(t => cats[t.cat] = (cats[t.cat] || 0) + t.monto);

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ data: Object.values(cats), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8'} } } }
            });
        }

        function cambiarTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
